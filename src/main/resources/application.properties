spring.application.name=http-parquet

ingestion.output-dir=data
ingestion.flush.max-interval-ms=1000
ingestion.flush.max-bytes=65536

# Google Cloud Storage upload
# Set gcs.enabled=true and fill in the remaining properties to activate uploads.
# Converted parquet files are uploaded after each hourly roll and on startup recovery.
gcs.enabled=false
# Name of the destination GCS bucket (required when enabled)
gcs.bucket-name=
# Path to a service account JSON key file.
# Leave blank to use Application Default Credentials
# (GOOGLE_APPLICATION_CREDENTIALS env var, gcloud auth application-default login, or GCE metadata).
gcs.credentials-path=
# Optional folder prefix inside the bucket, e.g. "events/raw". Leave blank for bucket root.
gcs.object-prefix=
